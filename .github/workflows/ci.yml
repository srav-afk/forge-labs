name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
      - name: go test
        run: go test ./...
      - name: go build
        run: |
          go build -o /tmp/forge-controlplane ./cmd/forge-controlplane
          go build -o /tmp/forge-worker ./cmd/forge-worker
          go build -o /tmp/forge-catalog ./cmd/forge-catalog
