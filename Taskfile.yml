version: '3'

tasks:
  gen:
    desc: Generate Go code from proto with buf
    aliases: [buf:gen]
    cmds:
      - buf generate

  lint:
    desc: Lint proto contracts
    cmds:
      - buf lint

  build:
    desc: Build control plane, worker, catalog
    deps: [gen]
    cmds:
      - mkdir -p bin
      - go build -o bin/forge-controlplane ./cmd/forge-controlplane
      - go build -o bin/forge-worker ./cmd/forge-worker
      - go build -o bin/forge-catalog ./cmd/forge-catalog

  test:
    desc: Run all Go tests
    cmds:
      - go test ./...

  lab:up:
    desc: Start tier-a compose + control plane + free worker
    cmds:
      - ./scripts/lab-up.sh

  lab:down:
    desc: Stop lab processes and tier-a compose
    cmds:
      - ./scripts/lab-down.sh

  worker:run:
    desc: Run forge-worker against local config
    deps: [gen]
    cmds:
      - go run ./cmd/forge-worker

  catalog:
    desc: 'Catalog CLI (usage: task catalog -- models)'
    cmds:
      - go run ./cmd/forge-catalog {{.CLI_ARGS}}

  migrate-diff:
    desc: 'Generate a migration from the GORM models (usage: task migrate-diff -- <name>)'
    cmds:
      - atlas migrate diff {{.CLI_ARGS}} --env gorm

  migrate:
    desc: Apply migrations to the local Postgres
    cmds:
      - 'FORGE_DB_URL="${FORGE_DB_URL:-postgres://forge:forge@localhost:5432/forge?sslmode=disable}" atlas migrate apply --env gorm'

  up:
    desc: Bring up the full local stack
    deps: [gen]
    cmds:
      - docker compose up -d --build

  down:
    desc: Tear down the local stack
    cmds:
      - docker compose down

  ps:
    desc: Show stack status
    cmds:
      - docker compose ps
