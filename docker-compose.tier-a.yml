services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports: ["25432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 3s
      retries: 10

  redis:
    image: redis:8.6.2-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./deploy/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports: ["26379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      retries: 10
