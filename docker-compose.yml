services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./deploy/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.9.1
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9092:9090"]

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    ports: ["3000:3000"]
    depends_on: [prometheus, jaeger]

  jaeger:
    image: jaegertracing/jaeger:2.6.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  migrate:
    image: arigaio/atlas:latest
    command: >-
      migrate apply
      --dir file:///migrations
      --url postgres://forge:forge@postgres:5432/forge?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  forge-controlplane:
    build:
      context: .
      dockerfile: deploy/controlplane.Dockerfile
    environment:
      FORGE_DB_URL: postgres://forge:forge@postgres:5432/forge?sslmode=disable
      FORGE_REDIS_URL: redis://redis:6379/0
      FORGE_OTLP_ENDPOINT: jaeger:4317
      FORGE_TRACE_SAMPLE_RATIO: "1.0"
    ports: ["8080:8080", "8081:8081", "9090:9090"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      jaeger:
        condition: service_started

  forge-worker:
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    environment:
      FORGE_CONTROLPLANE_GRPC: forge-controlplane:8081
      FORGE_REDIS_URL: redis://redis:6379/0
      FORGE_WORKER_GRPC_ADDR: ":50051"
      FORGE_WORKER_ENDPOINT: "forge-worker:50051"
      FORGE_OLLAMA_URL: http://host.docker.internal:11434
      FORGE_OLLAMA_KEEP_ALIVE: 5m
      FORGE_OTLP_ENDPOINT: jaeger:4317
      FORGE_TRACE_SAMPLE_RATIO: "1.0"
    ports: ["9091:9091", "50051:50051"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - forge-controlplane
      - jaeger
