services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.9.1
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9092:9090"]

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
    ports: ["3000:3000"]
    depends_on: [prometheus]

  migrate:
    image: arigaio/atlas:latest
    command: >-
      migrate apply
      --dir file:///migrations
      --url postgres://forge:forge@postgres:5432/forge?sslmode=disable
    volumes:
      - ./migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy

  forge-controlplane:
    build:
      context: .
      dockerfile: deploy/controlplane.Dockerfile
    environment:
      FORGE_DB_URL: postgres://forge:forge@postgres:5432/forge?sslmode=disable
    ports: ["8080:8080", "8081:8081", "9090:9090"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  forge-worker:
    build:
      context: .
      dockerfile: deploy/worker.Dockerfile
    environment:
      FORGE_CONTROLPLANE_GRPC: forge-controlplane:8081
    ports: ["9091:9091"]
    depends_on:
      - forge-controlplane
